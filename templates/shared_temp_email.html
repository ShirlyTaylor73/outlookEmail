<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱分享</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared-temp-email.css') }}">
</head>
<body data-share-token="{{ token|e }}" data-initial-status="{{ initial_status }}">
    <main class="shared-shell">
        <header class="shared-header">
            <div class="shared-title-group">
                <p class="shared-kicker">公开分享</p>
                <h1 id="sharedEmailAddress">邮箱分享</h1>
                <p id="sharedExpiresAt" class="shared-meta">正在加载分享信息...</p>
            </div>
            <button id="sharedRefreshBtn" class="shared-refresh" type="button">刷新邮件</button>
        </header>

        <div id="sharedStatus" class="shared-status" role="status" aria-live="polite"></div>

        <section id="sharedWorkbench" class="shared-workbench" aria-label="邮箱分享内容">
            <aside class="shared-list-panel" aria-label="邮件列表">
                <div class="panel-heading">
                    <h2>邮件列表</h2>
                    <span id="sharedEmailCount">0</span>
                </div>
                <div id="sharedEmailList" class="shared-email-list"></div>
            </aside>

            <article id="sharedEmailDetail" class="shared-detail-panel" aria-label="邮件详情">
                <div class="shared-empty">选择一封邮件查看详情</div>
            </article>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='js/shared-temp-email.js') }}"></script>
</body>
</html>
